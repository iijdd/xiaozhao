<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小招同学 - AI理财搭子</title>
<style>
  :root {
    --cmb-red: #ce0e2d;
    --cmb-red-light: rgba(206,14,45,0.06);
    --bg: #f0f2f5;
    --white: #fff;
    --text: #1a1a1e;
    --muted: #999;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    height: 100vh; height: 100dvh;
    display: flex; flex-direction: column;
    -webkit-tap-highlight-color: transparent;
  }
  .header {
    background: var(--white);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #eee;
    position: sticky; top: 0; z-index: 10;
  }
  .avatar {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--cmb-red), #e85d6f);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 18px; flex-shrink: 0;
  }
  .header-info { flex:1; }
  .header-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .header-tag { font-size: 11px; color: var(--muted); }
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
    -webkit-overflow-scrolling: touch;
  }
  .msg {
    display: flex; gap: 8px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .msg.bot { align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .msg .bubble {
    max-width: 80%;
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg.bot .bubble {
    background: var(--white);
    border-radius: 4px 16px 16px 16px;
    color: var(--text);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .msg.user .bubble {
    background: var(--cmb-red);
    border-radius: 16px 4px 16px 16px;
    color: #fff;
  }
  .typing {
    display: flex; gap: 8px; align-items: center; padding: 4px 0;
  }
  .typing .dot {
    width: 6px; height: 6px;
    background: #ccc; border-radius: 50%;
    animation: bounce 1.4s infinite ease both;
  }
  .typing .dot:nth-child(2) { animation-delay: 0.16s; }
  .typing .dot:nth-child(3) { animation-delay: 0.32s; }
  @keyframes bounce {
    0%,80%,100% { transform:scale(0.6); }
    40% { transform:scale(1); }
  }
  .input-bar {
    background: var(--white);
    padding: 10px 12px;
    display: flex; gap: 8px;
    border-top: 1px solid #eee;
    position: sticky; bottom: 0;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
  }
  .input-bar input {
    flex: 1;
    border: 1px solid #e0e0e0;
    border-radius: 20px;
    padding: 10px 16px;
    font-size: 15px;
    outline: none;
    background: #f8f9fb;
  }
  .input-bar input:focus { border-color: var(--cmb-red); }
  .input-bar button {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: var(--cmb-red);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .disclaimer {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    padding: 6px;
    background: var(--bg);
  }
</style>
</head>
<body>

<div class="header">
  <div class="avatar">💼</div>
  <div class="header-info">
    <div class="header-name">小招同学</div>
    <div class="header-tag">AI理财搭子 · 在线</div>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="input-bar">
  <input id="input" type="text" placeholder="跟我说说你的钱包状态..."
    autocomplete="off" autocorrect="off" autocapitalize="off">
  <button onclick="send()">➤</button>
</div>
<div class="disclaimer">AI搭子 · 仅供参考，不构成投资建议</div>

<script>
const API_KEY = 'app-kLuUlkZwDoexjaV5tMija4Mk';
const API_URL = 'https://udify.app/v1/chat-messages';
const USER_ID = 'user_' + Date.now();
let CONV_ID = '';

// 开场白
const WELCOME = `哈喽！我是小招同学，你的理财搭子~
我也是大学生（金融专业大三），知道咱们的钱包都不容易。先别紧张，我不是来教你做人的，就是来陪你一起管好小钱包的。
你最近有为什么花销烦恼吗？`;

const chat = document.getElementById('chat');
const input = document.getElementById('input');

// 显示开场白
addMsg('bot', WELCOME);

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg('user', text);
  const typingEl = addTyping();

  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        query: text,
        user: USER_ID,
        response_mode: 'blocking',
        conversation_id: CONV_ID
      })
    });

    const data = await resp.json();
    typingEl.remove();
    CONV_ID = data.conversation_id || CONV_ID;
    addMsg('bot', data.answer || '（网络不稳定，再试一次？）');
  } catch (e) {
    typingEl.remove();
    addMsg('bot', '网络不太稳，再试一次？😢');
  }
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
