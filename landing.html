<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小招同学 — 你的AI理财搭子</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --cmb-red: #ce0e2d;
    --text: #1a1a1e;
    --muted: #999ba3;
    --bg: #f5f6f8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 48px 32px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .avatar {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, #ce0e2d, #e85d6f);
    border-radius: 50%;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: #fff;
  }
  h1 { font-size: 22px; color: var(--text); margin-bottom: 4px; }
  .tagline { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
  .features {
    text-align: left;
    margin-bottom: 28px;
    padding: 0 8px;
  }
  .feature {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 12px;
    font-size: 14px;
    color: var(--text);
  }
  .feature-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  #qrcode {
    display: inline-block;
    margin-bottom: 12px;
    padding: 8px;
    border: 1px solid #eee;
    border-radius: 12px;
  }
  .scan-hint { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .btn {
    display: inline-block;
    background: var(--cmb-red);
    color: #fff;
    text-decoration: none;
    padding: 12px 32px;
    border-radius: 24px;
    font-size: 15px;
    font-weight: 600;
    transition: background 0.2s;
  }
  .btn:hover { background: #b00c26; }
  .footer { font-size: 11px; color: var(--muted); margin-top: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="avatar">💼</div>
  <h1>小招同学</h1>
  <p class="tagline">你的神仙财商室友 · AI理财搭子</p>

  <div class="features">
    <div class="feature">
      <span class="feature-icon">💰</span>
      <span><strong>3分钟财务体检</strong> — 看看你的"财务体质"在同龄人中排第几</span>
    </div>
    <div class="feature">
      <span class="feature-icon">🛡️</span>
      <span><strong>拿铁因子拦截</strong> — 每次想冲动消费，帮你算算=几杯奶茶</span>
    </div>
    <div class="feature">
      <span class="feature-icon">🚨</span>
      <span><strong>FOMO粉碎机</strong> — "室友买基金赚疯了"时拉你一把</span>
    </div>
    <div class="feature">
      <span class="feature-icon">📊</span>
      <span><strong>赛博把脉周报</strong> — 每周末一份你的"财务体检单"</span>
    </div>
  </div>

  <div style="display:flex;gap:20px;justify-content:center;margin-bottom:8px;flex-wrap:wrap">
    <div>
      <div id="qrcode-light" style="display:inline-block;padding:6px;border:1px solid #eee;border-radius:10px"></div>
      <p style="font-size:12px;color:var(--muted);margin-top:6px">⚡ 轻量版（秒开）</p>
    </div>
    <div>
      <div id="qrcode-full" style="display:inline-block;padding:6px;border:1px solid #eee;border-radius:10px"></div>
      <p style="font-size:12px;color:var(--muted);margin-top:6px">🏦 全量版（Dify官方）</p>
    </div>
  </div>
  <p class="scan-hint">📱 轻量版加载更快，全量版功能更全</p>

  <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
    <a class="btn" href="https://iijdd.github.io/xiaozhao/chat.html" target="_blank">⚡ 轻量版</a>
    <a class="btn" href="https://udify.app/chatbot/uWxkxB4KjBNuuSto" target="_blank">🏦 全量版</a>
  </div>
  <p class="footer">
    招商银行数字金融训练营 · AI产品赛道<br>
    赵梓维（中山大学）
  </p>
</div>

<script>
new QRCode(document.getElementById("qrcode-light"), {
  text: "https://iijdd.github.io/xiaozhao/chat.html",
  width: 140,
  height: 140,
  colorDark: "#ce0e2d",
  colorLight: "#ffffff",
  correctLevel: QRCode.CorrectLevel.M
});
new QRCode(document.getElementById("qrcode-full"), {
  text: "https://udify.app/chatbot/uWxkxB4KjBNuuSto",
  width: 140,
  height: 140,
  colorDark: "#ce0e2d",
  colorLight: "#ffffff",
  correctLevel: QRCode.CorrectLevel.M
});
</script>
</body>
</html>
