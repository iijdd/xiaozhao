<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小招同学 — 封面</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: linear-gradient(135deg, #0a0a14 0%, #1a1020 30%, #0d1117 60%, #0a0a14 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    position: relative;
  }
  /* 背景装饰圆 */
  .bg-circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.06;
    pointer-events: none;
  }
  .bg-circle.a { width: 800px; height: 800px; background: #ce0e2d; top: -200px; right: -200px; }
  .bg-circle.b { width: 400px; height: 400px; background: #ce0e2d; bottom: -100px; left: 10%; }
  .bg-circle.c { width: 200px; height: 200px; background: #ce0e2d; top: 30%; left: 5%; }
  /* 细线装饰 */
  .line-top {
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #ce0e2d, transparent);
  }
  .line-bottom {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #ce0e2d, transparent);
  }
  /* 竖线 */
  .line-left {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, transparent, rgba(206,14,45,0.3), transparent);
  }
  /* 内容区 */
  .content {
    text-align: center;
    z-index: 1;
    position: relative;
  }
  /* 小图标 */
  .icon-row {
    margin-bottom: 36px;
    font-size: 48px;
    letter-spacing: 16px;
    opacity: 0.7;
  }
  /* 主标题 */
  .title {
    font-size: 96px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 16px;
    margin-bottom: 16px;
    text-shadow: 0 0 80px rgba(206,14,45,0.3);
  }
  .title .highlight {
    color: #ce0e2d;
  }
  /* 副标题 */
  .subtitle {
    font-size: 36px;
    font-weight: 300;
    color: rgba(255,255,255,0.65);
    letter-spacing: 10px;
    margin-bottom: 60px;
  }
  /* 分割线 */
  .divider {
    width: 360px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(206,14,45,0.5), transparent);
    margin: 0 auto 60px;
  }
  /* 标签行 */
  .tags {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 72px;
  }
  .tag {
    padding: 10px 28px;
    border: 1px solid rgba(206,14,45,0.3);
    border-radius: 24px;
    color: rgba(255,255,255,0.55);
    font-size: 18px;
    letter-spacing: 4px;
  }
  /* 底部信息 */
  .info {
    font-size: 20px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 6px;
    line-height: 2;
  }
  .info .bold { color: rgba(255,255,255,0.5); font-weight: 500; }
</style>
</head>
<body>

<div class="bg-circle a"></div>
<div class="bg-circle b"></div>
<div class="bg-circle c"></div>
<div class="line-top"></div>
<div class="line-bottom"></div>
<div class="line-left"></div>

<div class="content">
  <div class="icon-row">💼 🤖 💰</div>
  <div class="title">
    小招<span class="highlight">同学</span>
  </div>
  <div class="subtitle">
    大学生理财陪伴AI搭子智能体
  </div>
  <div class="divider"></div>
  <div class="tags">
    <span class="tag">AI对话教练</span>
    <span class="tag">财务体检</span>
    <span class="tag">风控拦截</span>
    <span class="tag">赛博周报</span>
  </div>
  <div class="info">
    <span class="bold">招商银行</span> 数字金融训练营 · AI产品赛道 复赛方案<br>
    汇报人：赵梓维（中山大学）
  </div>
</div>

</body>
</html>
